<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오브코스 캠페인 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111620;
    --card: #161c2a;
    --border: #1e2a3d;
    --accent: #3b82f6;
    --accent2: #10b981;
    --accent3: #f59e0b;
    --accent4: #8b5cf6;
    --text: #e2e8f0;
    --muted: #64748b;
    --highlight: #1d2d4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header .subtitle { font-size: 11px; color: var(--muted); margin-left: auto; }

  .main { padding: 20px 28px; }

  /* Filters */
  .filter-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
  .filter-group label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .filter-select:focus { outline: none; border-color: var(--accent); }
  .filter-select[multiple] { height: 90px; }
  .filter-select option { padding: 4px 6px; }
  .filter-select option:checked { background: var(--highlight); color: var(--accent); }
  .btn-reset {
    background: var(--highlight);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    align-self: flex-end;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-reset:hover { background: var(--accent); color: #fff; }

  /* Summary Cards */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .summary-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .summary-card .s-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }
  .summary-card .s-value { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
  .summary-card .s-value.blue { color: var(--accent); }
  .summary-card .s-value.green { color: var(--accent2); }
  .summary-card .s-value.amber { color: var(--accent3); }
  .summary-card .s-value.purple { color: var(--accent4); }
  .summary-card .s-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* Table Section */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .table-controls {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .table-controls .result-count { font-size: 11px; color: var(--muted); margin-left: auto; }
  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    width: 200px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .col-selector {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface); }
  th {
    padding: 10px 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: relative;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  th:hover { color: var(--text); background: var(--highlight); }
  th.sort-asc::after { content: ' ▲'; color: var(--accent); }
  th.sort-desc::after { content: ' ▼'; color: var(--accent); }
  td {
    padding: 9px 12px;
    border-bottom: 1px solid #0f1620;
    white-space: nowrap;
    font-size: 12px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #141d2e; }
  td.num { font-family: 'Space Grotesk', sans-serif; text-align: right; }
  td.name-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  td.month-badge span {
    background: var(--highlight);
    color: var(--accent);
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 700;
  }

  .positive { color: var(--accent2); }
  .warn { color: var(--accent3); }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 14px;
    border-top: 1px solid var(--border);
  }
  .page-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* No data */
  .no-data { text-align: center; color: var(--muted); padding: 40px; font-size: 13px; }

  /* Tooltip */
  .tip {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--muted);
    position: absolute;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
    display: none;
  }

  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab {
    padding: 8px 16px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-weight: 500;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  @media (max-width: 768px) {
    .main { padding: 12px 14px; }
    .filter-bar { gap: 8px; }
    .summary-row { grid-template-columns: repeat(2, 1fr); }
  }

  /* Charts */
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px 14px;
    transition: border-color 0.2s;
  }
  .chart-card:hover { border-color: var(--accent); }
  .chart-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .chart-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .chart-title {
    font-size: 13px;
    font-weight: 700;
    flex: 1;
  }
  .chart-unit { font-weight: 400; color: var(--muted); font-size: 11px; }
  .chart-badge {
    font-size: 10px;
    font-weight: 700;
    border-radius: 5px;
    padding: 2px 8px;
  }
  .chart-badge.blue { background: var(--highlight); color: var(--accent); }
  .chart-badge.green { background: #0d2e20; color: var(--accent2); }
  .chart-badge.amber { background: #2d2010; color: var(--accent3); }
  .chart-badge.purple { background: #1e1a3a; color: var(--accent4); }
  .chart-wrap { position: relative; height: 220px; }

  @media (max-width: 900px) {
    .chart-grid { grid-template-columns: 1fr; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- Password Gate -->
<div id="pwGate" style="
  position:fixed; inset:0; z-index:9999;
  background: linear-gradient(135deg, #0a0d14 0%, #0f172a 60%, #1e3a5f 100%);
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  font-family:'Noto Sans KR',sans-serif;
">
  <div style="
    background:#161c2a; border:1px solid #1e2a3d; border-radius:16px;
    padding:40px 44px; width:360px; text-align:center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  ">
    <div style="width:48px;height:48px;border-radius:12px;background:#1d2d4a;
      display:flex;align-items:center;justify-content:center;
      font-size:22px;margin:0 auto 18px;">🔐</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;
      color:#e2e8f0;margin-bottom:6px;">오브코스 대시보드</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:28px;">접근하려면 비밀번호를 입력하세요</div>
    <input id="pwInput" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()" style="
      width:100%; background:#111620; border:1px solid #1e2a3d; color:#e2e8f0;
      border-radius:9px; padding:11px 14px; font-size:14px;
      font-family:'Noto Sans KR',sans-serif; outline:none;
      transition:border-color 0.2s; margin-bottom:12px;
    " onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#1e2a3d'">
    <div id="pwError" style="font-size:11px;color:#ef4444;margin-bottom:10px;min-height:16px;"></div>
    <button onclick="checkPw()" style="
      width:100%; background:#3b82f6; color:#fff; border:none;
      border-radius:9px; padding:11px; font-size:14px; font-weight:700;
      font-family:'Noto Sans KR',sans-serif; cursor:pointer;
      transition:background 0.2s;
    " onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='#3b82f6'">
      입장하기
    </button>
  </div>
</div>

<script>
  function checkPw() {
    const val = document.getElementById('pwInput').value;
    if (val === 'vfac') {
      document.getElementById('pwGate').style.display = 'none';
    } else {
      const err = document.getElementById('pwError');
      const input = document.getElementById('pwInput');
      err.textContent = '비밀번호가 올바르지 않습니다';
      input.style.borderColor = '#ef4444';
      input.value = '';
      input.focus();
      setTimeout(() => { err.textContent = ''; input.style.borderColor = '#1e2a3d'; }, 2000);
    }
  }
</script>

<header>
  <div class="logo-dot"></div>
  <h1>오브코스 캠페인 대시보드</h1>
  <div class="subtitle" id="headerDate">로딩 중...</div>
</header>

<div class="main">

  <!-- Filters -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>월 (기간)</label>
      <select id="fMonth" class="filter-select" multiple></select>
    </div>
    <div class="filter-group">
      <label>캠페인</label>
      <select id="fCampaign" class="filter-select" multiple></select>
    </div>
    <div class="filter-group">
      <label>광고 세트</label>
      <select id="fAdset" class="filter-select" multiple></select>
    </div>
    <div class="filter-group">
      <label>광고 이름</label>
      <select id="fAd" class="filter-select" multiple></select>
    </div>
    <div class="filter-group" style="max-width:100px">
      <label>&nbsp;</label>
      <button class="btn-reset" onclick="resetFilters()">초기화</button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- Charts Section -->
  <div class="section-title">지표별 소재 성과 비교 그래프</div>
  <div class="chart-grid" id="chartGrid">
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-icon" style="background:#1d3a5f;color:#3b82f6">📊</span>
        <span class="chart-title">CPM <span class="chart-unit">(1,000회 노출당 비용)</span></span>
        <span class="chart-badge blue">₩</span>
      </div>
      <div class="chart-wrap"><canvas id="chartCPM"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-icon" style="background:#1a3a2a;color:#10b981">📊</span>
        <span class="chart-title">링크클릭율 (CTR)</span>
        <span class="chart-badge green">%</span>
      </div>
      <div class="chart-wrap"><canvas id="chartCTR"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-icon" style="background:#2d2010;color:#f59e0b">📊</span>
        <span class="chart-title">CPF <span class="chart-unit">(팔로우당 비용)</span></span>
        <span class="chart-badge amber">₩</span>
      </div>
      <div class="chart-wrap"><canvas id="chartCPF"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-icon" style="background:#1e1a3a;color:#8b5cf6">📊</span>
        <span class="chart-title">E_CVR <span class="chart-unit">(전환율)</span></span>
        <span class="chart-badge purple">%</span>
      </div>
      <div class="chart-wrap"><canvas id="chartECVR"></canvas></div>
    </div>
  </div>

  <!-- Table -->
  <div class="section-title">상세 데이터</div>
  <div class="table-wrap">
    <div class="table-controls">
      <input class="search-input" type="text" id="searchInput" placeholder="검색...">
      <select class="col-selector" id="colPreset" onchange="applyPreset()">
        <option value="all">모든 지표</option>
        <option value="reach">도달/노출</option>
        <option value="engagement">참여</option>
        <option value="cost">비용 지표</option>
        <option value="rate">비율 지표</option>
      </select>
      <span class="result-count" id="resultCount"></span>
    </div>
    <div style="overflow-x:auto">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

function fmtNum(val, key) {
  if (val === 0 || val === null || val === undefined) return '-';
  if (['E_CVR','VTR','링크클릭율'].includes(key)) return (val * 100).toFixed(2) + '%';
  if (['지출 금액 (KRW)','CPF','CPC(링크 클릭당 비용)','CPM(1,000회 노출당 비용)','CPL'].includes(key)) {
    return '₩' + Math.round(val).toLocaleString('ko-KR');
  }
  return Math.round(val).toLocaleString('ko-KR');
}

function monthLabel(m) {
  if (!m) return '-';
  const parts = m.split(' - ');
  const d = new Date(parts[0]);
  return (d.getMonth()+1) + '월 (' + parts[0].slice(0,7) + ')';
}

function getSelections(id) {
  const sel = document.getElementById(id);
  return Array.from(sel.selectedOptions).map(o => o.value);
}

function populateFilters() {
  const months = [...new Set(DATA.map(r=>r['월']))].sort().reverse();

  // 월 옵션만 먼저 채움 — 나머지는 cascadeFilters()가 담당
  const fMonth = document.getElementById('fMonth');
  months.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.text = monthLabel(v);
    fMonth.appendChild(o);
  });
  fMonth.addEventListener('change', applyFilters);

  // 캠페인/광고세트/광고 슬라이서는 변경 시 applyFilters 호출
  ['fCampaign','fAdset','fAd'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });

  document.getElementById('headerDate').textContent =
    `데이터 기간: ${months[months.length-1].split(' - ')[0]} ~ ${months[0].split(' - ')[1]} | 총 ${DATA.length}건`;

  // 초기 cascade
  cascadeSlicers(DATA);
}

// 월 필터 기준으로 캠페인 슬라이서만 동적 갱신 (광고세트·광고는 전체 유지)
function cascadeSlicers(monthBase) {
  // 캠페인: 선택된 월에 존재하는 것만
  const prevCamp = getSelections('fCampaign');
  const campaigns = [...new Set(monthBase.map(r => r['캠페인 이름']).filter(Boolean))].sort();
  const elCamp = document.getElementById('fCampaign');
  elCamp.innerHTML = '';
  campaigns.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.text = v;
    // 이전 선택값 중 해당 월에도 존재하는 것만 유지
    if (prevCamp.includes(v)) o.selected = true;
    elCamp.appendChild(o);
  });

  // 광고세트·광고는 월 기준으로만 갱신 (선택값 유지)
  const prevAdset = getSelections('fAdset');
  const prevAd    = getSelections('fAd');
  const adsets = [...new Set(monthBase.map(r => r['광고 세트 이름']).filter(Boolean))].sort();
  const ads    = [...new Set(monthBase.map(r => r['광고 이름']).filter(Boolean))].sort();

  const refill = (id, arr, prev) => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    arr.forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.text = v;
      if (prev.includes(v)) o.selected = true;
      el.appendChild(o);
    });
  };
  refill('fAdset', adsets, prevAdset);
  refill('fAd',    ads,    prevAd);
}

function applyFilters() {
  const months = getSelections('fMonth');
  const q = document.getElementById('searchInput').value.toLowerCase();

  // ① 월 필터 먼저 적용
  const monthFiltered = months.length
    ? DATA.filter(r => months.includes(r['월']))
    : [...DATA];

  // ② 월 기반으로 슬라이서 옵션 갱신 (캠페인 포함)
  cascadeSlicers(monthFiltered);

  // ③ 슬라이서 갱신 후 현재 선택값 다시 읽기
  const camps  = getSelections('fCampaign');
  const adsets = getSelections('fAdset');
  const ads    = getSelections('fAd');

  // ④ 최종 필터 적용 — 반드시 monthFiltered 안에서만 추가 필터
  filtered = monthFiltered.filter(r => {
    if (camps.length  && !camps.includes(r['캠페인 이름']))     return false;
    if (adsets.length && !adsets.includes(r['광고 세트 이름'])) return false;
    if (ads.length    && !ads.includes(r['광고 이름']))          return false;
    if (q) {
      const hay = [r['캠페인 이름'], r['광고 세트 이름'], r['광고 이름']].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sortCol) {
    filtered.sort((a, b) => ((a[sortCol] ?? 0) - (b[sortCol] ?? 0)) * sortDir);
  }

  page = 1;
  renderSummary();
  renderTable();
  renderCharts();  // filtered 기준으로 그래프 갱신
}

function resetFilters() {
  ['fMonth','fCampaign','fAdset','fAd'].forEach(id => {
    const el = document.getElementById(id);
    Array.from(el.options).forEach(o => o.selected = false);
  });
  document.getElementById('searchInput').value = '';
  sortCol = null; sortDir = 1;
  cascadeSlicers(DATA);   // 전체 데이터 기준으로 옵션 복원
  filtered = [...DATA];
  page = 1;
  renderSummary();
  renderTable();
  renderCharts();
}

function renderSummary() {
  const sum = (k) => filtered.reduce((a,r) => a + (r[k]||0), 0);
  const avg = (k) => filtered.length ? sum(k)/filtered.length : 0;

  const cards = [
    { label: '총 노출', val: sum('노출'), fmt: v => Math.round(v).toLocaleString(), cls: 'blue' },
    { label: '총 도달', val: sum('도달'), fmt: v => Math.round(v).toLocaleString(), cls: 'green' },
    { label: '총 링크 클릭', val: sum('링크 클릭'), fmt: v => Math.round(v).toLocaleString(), cls: 'amber' },
    { label: '총 게시물 공감', val: sum('게시물 공감'), fmt: v => Math.round(v).toLocaleString(), cls: 'purple' },
    { label: '총 Instagram 팔로우', val: sum('Instagram 팔로우'), fmt: v => Math.round(v).toLocaleString(), cls: 'blue' },
    { label: '총 지출 (KRW)', val: sum('지출 금액 (KRW)'), fmt: v => '₩'+Math.round(v).toLocaleString(), cls: 'amber' },
    { label: '평균 CPM', val: avg('CPM(1,000회 노출당 비용)'), fmt: v => v>0?'₩'+Math.round(v).toLocaleString():'-', cls: 'green' },
    { label: '평균 링크클릭율', val: avg('링크클릭율'), fmt: v => v>0?(v*100).toFixed(2)+'%':'-', cls: 'purple' },
    { label: '데이터 건수', val: filtered.length, fmt: v => v+'건', cls: 'blue' },
  ];

  document.getElementById('summaryRow').innerHTML = cards.map(c => `
    <div class="summary-card">
      <div class="s-label">${c.label}</div>
      <div class="s-value ${c.cls}">${c.fmt(c.val)}</div>
    </div>`).join('');
}

function applyPreset() {
  const preset = document.getElementById('colPreset').value;
  activeMetrics = PRESETS[preset] || METRICS;
  renderTable();
}

function setSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  filtered.sort((a,b) => ((a[col]??0)-(b[col]??0))*sortDir);
  page = 1;
  renderTable();
}

function renderTable() {
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');

  const dimCols = ['월','캠페인 이름','광고 세트 이름','광고 이름'];
  const allCols = [...dimCols, ...activeMetrics];

  head.innerHTML = '<tr>' + allCols.map(c => {
    const cls = sortCol===c ? (sortDir>0?'sort-asc':'sort-desc') : '';
    const onclick = activeMetrics.includes(c) ? `onclick="setSort('${c}')"` : '';
    return `<th class="${cls}" ${onclick}>${c}</th>`;
  }).join('') + '</tr>';

  const start = (page-1)*PAGE_SIZE, end = start+PAGE_SIZE;
  const pageData = filtered.slice(start, end);

  if (!pageData.length) {
    body.innerHTML = `<tr><td colspan="${allCols.length}" class="no-data">조건에 맞는 데이터가 없습니다</td></tr>`;
  } else {
    body.innerHTML = pageData.map(r => '<tr>' + allCols.map(c => {
      if (c === '월') return `<td class="month-badge"><span>${monthLabel(r[c])}</span></td>`;
      if (['캠페인 이름','광고 세트 이름','광고 이름'].includes(c)) return `<td class="name-cell" title="${r[c]||''}">${r[c]||'-'}</td>`;
      return `<td class="num">${fmtNum(r[c], c)}</td>`;
    }).join('') + '</tr>').join('');
  }

  document.getElementById('resultCount').textContent = `${filtered.length}건 / 전체 ${DATA.length}건`;
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹ 이전</button>`;
  const range = 5;
  let start = Math.max(1, page-Math.floor(range/2));
  let end = Math.min(total, start+range-1);
  if (end-start < range-1) start = Math.max(1, end-range+1);

  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span style="color:var(--muted);padding:0 4px">…</span>':''}`;
  for (let i=start;i<=end;i++) html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < total) html += `${end<total-1?'<span style="color:var(--muted);padding:0 4px">…</span>':''}<button class="page-btn" onclick="goPage(${total})">${total}</button>`;
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===total?'disabled':''}>다음 ›</button>`;

  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length/PAGE_SIZE);
  if (p<1||p>total) return;
  page = p;
  renderTable();
  document.querySelector('.table-wrap').scrollIntoView({behavior:'smooth', block:'start'});
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

// ─── Chart instances ──────────────────────────────────────────────────────────
let chartInstances = {};

const CHART_PALETTE = [
  '#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444',
  '#06b6d4','#f97316','#84cc16','#ec4899','#a78bfa'
];

function buildChartData(metric) {
  // Group by 광고 이름, average the metric
  const map = {};
  filtered.forEach(r => {
    const name = r['광고 이름'] || '알 수 없음';
    if (!map[name]) map[name] = { sum: 0, cnt: 0 };
    const v = r[metric] || 0;
    if (v > 0) { map[name].sum += v; map[name].cnt++; }
  });
  // Sort by avg desc, take top 12
  const entries = Object.entries(map)
    .map(([k, v]) => ({ label: k, avg: v.cnt ? v.sum / v.cnt : 0 }))
    .filter(e => e.avg > 0)
    .sort((a, b) => b.avg - a.avg)
    .slice(0, 12);
  return {
    labels: entries.map(e => e.label.length > 16 ? e.label.slice(0,16)+'…' : e.label),
    fullLabels: entries.map(e => e.label),
    values: entries.map(e => e.avg)
  };
}

function renderCharts() {
  const configs = [
    {
      id: 'chartCPM', metric: 'CPM(1,000회 노출당 비용)',
      color: '#3b82f6', fmt: v => '₩'+Math.round(v).toLocaleString()
    },
    {
      id: 'chartCTR', metric: '링크클릭율',
      color: '#10b981', fmt: v => (v*100).toFixed(3)+'%', scale: 100, suffix: '%'
    },
    {
      id: 'chartCPF', metric: 'CPF',
      color: '#f59e0b', fmt: v => '₩'+Math.round(v).toLocaleString()
    },
    {
      id: 'chartECVR', metric: 'E_CVR',
      color: '#8b5cf6', fmt: v => (v*100).toFixed(4)+'%', scale: 100, suffix: '%'
    }
  ];

  configs.forEach(({ id, metric, color, fmt, scale, suffix }) => {
    const { labels, fullLabels, values } = buildChartData(metric);
    const canvas = document.getElementById(id);
    if (!canvas) return;

    if (chartInstances[id]) { chartInstances[id].destroy(); }

    const displayValues = scale ? values.map(v => v * scale) : values;

    chartInstances[id] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: displayValues,
          backgroundColor: labels.map((_, i) => CHART_PALETTE[i % CHART_PALETTE.length] + 'cc'),
          borderColor: labels.map((_, i) => CHART_PALETTE[i % CHART_PALETTE.length]),
          borderWidth: 1,
          borderRadius: 5,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0f172a',
            borderColor: '#1e2a3d',
            borderWidth: 1,
            titleColor: '#94a3b8',
            bodyColor: '#e2e8f0',
            titleFont: { family: 'Noto Sans KR', size: 11 },
            bodyFont: { family: 'Space Grotesk', size: 13, weight: '700' },
            callbacks: {
              title: (items) => fullLabels[items[0].dataIndex],
              label: (item) => {
                const orig = values[item.dataIndex];
                return ' ' + fmt(orig);
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#1e2a3d' },
            ticks: {
              color: '#64748b',
              font: { family: 'Noto Sans KR', size: 10 },
              maxRotation: 35, minRotation: 20
            }
          },
          y: {
            grid: { color: '#1a2236' },
            ticks: {
              color: '#64748b',
              font: { family: 'Space Grotesk', size: 10 },
              callback: (v) => {
                if (suffix) return v.toFixed(suffix === '%' && v < 1 ? 3 : 1) + suffix;
                return '₩' + Math.round(v).toLocaleString();
              }
            }
          }
        }
      }
    });
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
// Init
populateFilters();
applyFilters();
</script>
